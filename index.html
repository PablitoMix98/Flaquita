<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pensando en ti</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&display=swap');

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #fcf4f6;
      overflow: hidden;
    }

    #aw {
      background: radial-gradient(circle at 50% 50%, #fffafb 0%, #fdf1f4 100%);
      width: 100%;
      height: 100%;
      position: relative;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    canvas#sc {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transform: translateY(20px) scale(0.98);
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .scene.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .scene.exit {
      opacity: 0;
      transform: translateY(-20px) scale(1.02);
      pointer-events: none;
    }

    #s0 .tagline {
      font-size: 13px;
      letter-spacing: 0.35em;
      color: #d49aab;
      text-transform: uppercase;
      margin-bottom: 28px;
      text-align: center;
      animation: float 6s ease-in-out infinite;
    }

    #s0 .big-name {
      font-size: 18vw;
      font-weight: 300;
      font-style: italic;
      color: #b56c81;
      letter-spacing: 0.04em;
      line-height: 1.1;
      text-align: center;
      position: relative;
    }

    @media (min-width: 600px) {
      #s0 .big-name {
        font-size: 72px;
      }
    }

    #s0 .sub {
      font-size: 14px;
      letter-spacing: 0.22em;
      color: #d49aab;
      text-transform: uppercase;
      margin-top: 20px;
      animation: float 6s ease-in-out infinite alternate-reverse;
    }

    .shimmer-wrap {
      position: relative;
      display: inline-block;
      overflow: hidden;
    }

    .shimmer-overlay {
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
      animation: shimmer 3.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% {
        left: -60%
      }

      100% {
        left: 160%
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }

      100% {
        transform: translateY(0);
      }
    }

    .cta {
      margin-top: 52px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid #eccbd3;
      color: #b56c81;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 12px 36px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.4s ease;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 15px rgba(220, 160, 180, 0.1);
    }

    .cta:hover {
      border-color: #b56c81;
      color: #8e4f62;
      background: #fae4eb;
      box-shadow: 0 6px 20px rgba(220, 160, 180, 0.2);
      transform: translateY(-2px);
    }

    .line-sep {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d49aab, transparent);
      margin: 32px auto;
    }

    .q-text {
      font-size: 24px;
      font-weight: 300;
      font-style: italic;
      color: #8e4f62;
      line-height: 1.6;
      text-align: center;
      max-width: 90%;
    }

    .q-author {
      font-size: 13px;
      letter-spacing: 0.2em;
      color: #d49aab;
      text-transform: uppercase;
      margin-top: 22px;
      font-weight: 600;
    }

    .nav-btn {
      margin-top: 44px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid #eccbd3;
      color: #b56c81;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 12px 32px;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.4s ease;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 15px rgba(220, 160, 180, 0.1);
    }

    .nav-btn:hover {
      border-color: #b56c81;
      color: #8e4f62;
      background: #fae4eb;
      transform: translateY(-2px);
    }

    .dots {
      display: flex;
      gap: 10px;
      margin-top: 28px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #eccbd3;
      transition: all 0.5s;
    }

    .dot.active {
      background: #b56c81;
      transform: scale(1.3);
    }

    .cursor {
      display: inline-block;
      width: 1.5px;
      height: 1em;
      background: #b56c81;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .reveal-word {
      opacity: 0;
      display: inline-block;
      transition: opacity 0.5s ease, transform 0.5s ease, filter 0.5s ease;
      transform: translateY(8px) scale(0.95);
      filter: blur(2px);
    }

    .reveal-word.shown {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    #s3 {
      background: transparent;
    }

    #final-big {
      font-size: 16px;
      font-weight: 300;
      font-style: italic;
      color: #8e4f62;
      letter-spacing: 0.08em;
      text-align: center;
      opacity: 0;
      transition: opacity 1.8s ease, transform 1.8s ease;
      line-height: 1.6;
      transform: scale(0.9);
    }

    #final-sub {
      font-size: 12px;
      letter-spacing: 0.3em;
      color: #d49aab;
      text-transform: uppercase;
      margin-top: 24px;
      opacity: 0;
      transition: opacity 1.4s ease;
    }

    #heart-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
    }

    /* Flores flotantes y destellos dinámicos */
    .petal {
      position: absolute;
      pointer-events: none;
      border-radius: 50% 0 50% 50%;
      background: rgba(245, 180, 195, 0.4);
      animation: fall linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      0% {
        transform: translate(0, -10%) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translate(100px, 100vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  <h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Mensaje especial para Aishia
  </h2>

  <div id="aw">
    <canvas id="sc"></canvas>
    <canvas id="heart-canvas"></canvas>

    <div class="scene active" id="s0">
      <div class="tagline">Leyendo un fragmento de texto, te recordé a ti</div>
      <div class="shimmer-wrap">
        <div class="big-name shimmer-text">Aishia</div>
        <div class="shimmer-overlay"></div>
      </div>
      <div class="sub">con amor, Pablito Mix</div>
      <button class="cta" id="open-btn" type="button">Leer &nbsp;›</button>
    </div>

    <div class="scene" id="s1">
      <div class="q-text" id="qt1"></div>
      <div class="line-sep"></div>
      <button class="nav-btn" id="next-btn" type="button" style="opacity:0;transition:opacity 1s">continuar
        &nbsp;›</button>
      <div class="dots" style="opacity:0;transition:opacity 1s" id="prog1">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="scene" id="s2">
      <div class="q-text" id="qt2"></div>
      <div class="q-author" id="qa2" style="opacity:0;transition:opacity 1.2s">— Charles Bukowski</div>
      <div class="line-sep"></div>
      <button class="nav-btn" id="next-btn2" type="button" style="opacity:0;transition:opacity 1s">continuar
        &nbsp;›</button>
      <div class="dots" style="opacity:0;transition:opacity 1s" id="prog2">
        <div class="dot"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="scene" id="s3">
      <div id="final-big">tuyo,<br>siempre mi amor.</div>
      <div class="dots" style="opacity:0;transition:opacity 1s;margin-top:32px" id="prog3">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot active"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const wrap = document.getElementById('aw');
      const sc = document.getElementById('sc');
      const hc = document.getElementById('heart-canvas');
      const sctx = sc.getContext('2d');
      const hctx = hc.getContext('2d');
      let stars = [], shooting = [], particles = [], t = 0;
      let heartActive = false, heartT = 0;

      function resize() {
        sc.width = hc.width = window.innerWidth;
        sc.height = hc.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);

      function initStars() {
        resize();
        stars = Array.from({ length: 80 }, () => ({
          x: Math.random() * sc.width,
          y: Math.random() * sc.height,
          r: Math.random() * 1.5 + 0.3,
          alpha: Math.random() * 0.5 + 0.1,
          speed: Math.random() * 0.005 + 0.002,
          phase: Math.random() * Math.PI * 2
        }));
      }

      function spawnShooting() {
        if (Math.random() > 0.012) return;
        shooting.push({
          x: Math.random() * sc.width * 0.8,
          y: Math.random() * sc.height * 0.3,
          vx: 4 + Math.random() * 3,
          vy: 1.5 + Math.random() * 1.5,
          len: 90 + Math.random() * 60,
          life: 1
        });
      }

      function drawShooting() {
        shooting = shooting.filter(s => s.life > 0);
        shooting.forEach(s => {
          const g = sctx.createLinearGradient(s.x - s.vx * s.len / 4, s.y - s.vy * s.len / 4, s.x, s.y);
          g.addColorStop(0, 'rgba(235, 175, 190, 0)');
          g.addColorStop(1, `rgba(235, 175, 190, ${s.life * 0.8})`);
          sctx.beginPath();
          sctx.moveTo(s.x - s.vx * s.len / 4, s.y - s.vy * s.len / 4);
          sctx.lineTo(s.x, s.y);
          sctx.strokeStyle = g;
          sctx.lineWidth = 1.5;
          sctx.stroke();
          s.x += s.vx; s.y += s.vy; s.life -= 0.03;
        });
      }

      function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
      function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)); }

      function spawnHeartParticles() {
        const cx = hc.width / 2, cy = hc.height / 2;
        const scale = Math.min(hc.width, hc.height) * (window.innerWidth < 600 ? 0.022 : 0.035);
        for (let i = 0; i < 4; i++) {
          const angle = Math.random() * Math.PI * 2;
          const hx = cx + heartX(angle) * scale;
          const hy = cy + heartY(angle) * scale;
          const speed = 0.4 + Math.random() * 1;
          particles.push({
            x: hx, y: hy,
            vx: (Math.random() - 0.5) * speed,
            vy: (Math.random() - 0.5) * speed - 0.5,
            r: Math.random() * 2 + 0.8,
            life: 1,
            decay: 0.01 + Math.random() * 0.01,
            color: Math.random() > 0.5 ? '219, 112, 147' : '235, 175, 190'
          });
        }
      }

      function drawHeart() {
        hctx.clearRect(0, 0, hc.width, hc.height);
        if (!heartActive) return;

        const cx = hc.width / 2, cy = hc.height / 2;
        const scale = Math.min(hc.width, hc.height) * (window.innerWidth < 600 ? 0.022 : 0.035);
        const pulse = 1 + 0.05 * Math.sin(heartT * 2);

        hctx.save();
        hctx.translate(cx, cy);
        hctx.scale(pulse, pulse);
        hctx.beginPath();
        for (let i = 0; i <= Math.PI * 2; i += 0.02) {
          const x = heartX(i) * scale;
          const y = heartY(i) * scale;
          i === 0 ? hctx.moveTo(x, y) : hctx.lineTo(x, y);
        }
        hctx.closePath();
        hctx.strokeStyle = `rgba(219, 112, 147, ${0.3 + 0.1 * Math.sin(heartT * 2)})`;
        hctx.lineWidth = 1.2;
        hctx.stroke();
        hctx.restore();

        spawnHeartParticles();
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
          hctx.beginPath();
          hctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          hctx.fillStyle = `rgba(${p.color}, ${p.life * 0.7})`;
          hctx.fill();
          p.x += p.vx; p.y += p.vy;
          p.life -= p.decay;
        });

        heartT += 0.02;
      }

      function loop() {
        sctx.clearRect(0, 0, sc.width, sc.height);
        t += 0.016;
        stars.forEach(s => {
          const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 60 + s.phase));
          sctx.beginPath();
          sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          sctx.fillStyle = `rgba(235, 175, 190, ${a})`;
          sctx.fill();
        });
        spawnShooting();
        drawShooting();
        drawHeart();
        requestAnimationFrame(loop);
      }

      function switchScene(fromId, toId, cb) {
        const from = document.getElementById(fromId);
        const to = document.getElementById(toId);
        from.classList.remove('active');
        from.classList.add('exit');
        setTimeout(() => {
          to.classList.add('active');
          setTimeout(() => {
            if (cb) cb();
          }, 600);
        }, 800);
      }

      function typeText(el, text, speed, done) {
        el.innerHTML = '\u201C';
        const cur = document.createElement('span');
        cur.className = 'cursor';
        el.appendChild(cur);
        let i = 0;
        (function tick() {
          if (i < text.length) {
            el.insertBefore(document.createTextNode(text[i]), cur);
            i++;
            setTimeout(tick, speed + Math.random() * 20);
          } else {
            setTimeout(() => { cur.remove(); el.innerHTML += '\u201D'; if (done) done(); }, 400);
          }
        })();
      }

      function revealWords(el, text, done) {
        const words = text.split(' ');
        el.innerHTML = '';
        el.appendChild(document.createTextNode('“'));

        words.forEach((w, i) => {
          const s = document.createElement('span');
          s.className = 'reveal-word';
          s.textContent = w;
          el.appendChild(s);

          // Fixed: Agrega un espacio real entre los span
          if (i < words.length - 1) {
            el.appendChild(document.createTextNode(' '));
          }
        });

        el.appendChild(document.createTextNode('”'));

        const spans = el.querySelectorAll('.reveal-word');
        let i = 0;

        (function show() {
          if (i < spans.length) {
            spans[i].classList.add('shown');
            i++;
            setTimeout(show, 120);
          } else if (done) {
            setTimeout(done, 400);
          }
        })();
      }

      // Create petals for dynamic effect
      function createPetals() {
        for (let i = 0; i < 8; i++) {
          let p = document.createElement('div');
          p.className = 'petal';
          p.style.left = Math.random() * 100 + 'vw';
          p.style.width = (Math.random() * 10 + 10) + 'px';
          p.style.height = (Math.random() * 10 + 10) + 'px';
          p.style.animationDuration = (Math.random() * 10 + 15) + 's';
          p.style.animationDelay = (Math.random() * 15) + 's';
          document.body.appendChild(p);
        }
      }

      initStars();
      loop();
      createPetals();

      document.getElementById('open-btn').addEventListener('click', () => {
        switchScene('s0', 's1', () => {
          typeText(document.getElementById('qt1'), "Dormimos abrazados como por una hora, y eso en cierto modo fue mejor que haber hecho el amor.", 45, () => {
            setTimeout(() => {
              document.getElementById('next-btn').style.opacity = '1';
              document.getElementById('prog1').style.opacity = '1';
            }, 500);
          });
        });
      });

      document.getElementById('next-btn').addEventListener('click', () => {
        switchScene('s1', 's2', () => {
          revealWords(document.getElementById('qt2'), "Mira, vamos a plantearlo de esta manera… para mí, tú eres la número uno, y ni siquiera hay número dos.", () => {
            document.getElementById('qa2').style.opacity = '1';
            setTimeout(() => {
              document.getElementById('next-btn2').style.opacity = '1';
              document.getElementById('prog2').style.opacity = '1';
            }, 800);
          });
        });
      });

      document.getElementById('next-btn2').addEventListener('click', () => {
        switchScene('s2', 's3', () => {
          heartActive = true;
          setTimeout(() => {
            const fb = document.getElementById('final-big');
            fb.style.fontSize = window.innerWidth < 600 ? '28px' : '48px';
            fb.style.opacity = '1';
            fb.style.transform = 'scale(1)';
          }, 600);
          setTimeout(() => { document.getElementById('final-sub').style.opacity = '1'; }, 1800);
          setTimeout(() => { document.getElementById('prog3').style.opacity = '1'; }, 2400);
        });
      });
    })();
  </script>
</body>

</html>
