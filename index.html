<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #060d1f;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .center {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  .heart-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .heart-svg {
    animation: heartbeat 1.6s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(180,120,255,0.7)) drop-shadow(0 0 40px rgba(120,80,220,0.4));
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.15); }
    30% { transform: scale(1); }
    45% { transform: scale(1.08); }
    60% { transform: scale(1); }
  }

  .ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 110px; height: 110px;
    border: 1px solid rgba(180,140,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: ring-pulse 3s ease-in-out infinite;
  }
  .ring2 {
    width: 140px; height: 140px;
    border-color: rgba(160,120,255,0.1);
    animation-delay: 1s;
  }

  @keyframes ring-pulse {
    0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.05); }
  }

  .text-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.9rem;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 3.8rem;
    font-weight: 700;
    color: #fff;
    text-align: center;
    line-height: 1.15;
    text-shadow: 0 0 40px rgba(180,140,255,0.6), 0 0 80px rgba(120,80,220,0.3);
    animation: glow 3s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { text-shadow: 0 0 30px rgba(180,140,255,0.5); }
    50% { text-shadow: 0 0 50px rgba(200,160,255,0.8), 0 0 100px rgba(140,100,255,0.4); }
  }

  .para {
    font-family: 'Dancing Script', cursive;
    font-size: 1.25rem;
    font-weight: 600;
    color: rgba(210,185,255,0.7);
    letter-spacing: 0.05em;
    animation: glow-sub 3s ease-in-out infinite;
  }

  @keyframes glow-sub {
    0%, 100% { color: rgba(200,175,255,0.65); }
    50% { color: rgba(220,200,255,0.9); }
  }

  .floating-hearts {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
  }

  .fh {
    position: absolute;
    bottom: -10px;
    opacity: 0;
    animation: rise linear infinite;
    color: #c97fff;
  }

  @keyframes rise {
    0% { opacity: 0; transform: translateY(0) scale(0.6); }
    15% { opacity: 0.6; }
    85% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-95vh) scale(1.1) rotate(15deg); }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="floating-hearts" id="fhc"></div>

<div class="center">
  <div class="heart-wrap">
    <div class="ring"></div>
    <div class="ring ring2"></div>
    <svg class="heart-svg" width="80" height="72" viewBox="0 0 80 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="hg" x1="0" y1="0" x2="80" y2="72" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#c87fff"/>
          <stop offset="100%" stop-color="#7c4dff"/>
        </linearGradient>
      </defs>
      <path d="M40 68 C40 68 4 44 4 22 C4 10 13 2 24 2 C31 2 37 6 40 11 C43 6 49 2 56 2 C67 2 76 10 76 22 C76 44 40 68 40 68Z" fill="url(#hg)"/>
      <path d="M18 16 C18 12 22 9 26 10" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="text-group">
    <h1>Te extraño<br>mami</h1>
    <span class="para">— PablitoMix ♡</span>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const stars = Array.from({length: 220}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.4 + 0.2,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * 0.012 + 0.004,
  blue: Math.random() > 0.7
}));

function draw(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const a = 0.25 + 0.65 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
    ctx.fillStyle = s.blue ? `rgba(180,160,255,${a})` : `rgba(255,255,255,${a * 0.8})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

const fhc = document.getElementById('fhc');
const syms = ['♡', '♥', '·', '✦', '✧'];

function spawn() {
  const el = document.createElement('div');
  el.className = 'fh';
  el.textContent = syms[Math.floor(Math.random() * syms.length)];
  el.style.left = (8 + Math.random() * 84) + '%';
  el.style.fontSize = (9 + Math.random() * 13) + 'px';
  el.style.animationDuration = (7 + Math.random() * 5) + 's';
  el.style.animationDelay = (Math.random() * 1.5) + 's';
  el.style.color = Math.random() > 0.45 ? '#c97fff' : '#9bb8ff';
  fhc.appendChild(el);
  setTimeout(() => el.remove(), 13000);
}

setInterval(spawn, 900);
for (let i = 0; i < 6; i++) setTimeout(spawn, i * 300);
</script>
</body>
</html>
